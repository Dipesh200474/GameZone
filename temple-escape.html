<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Temple Escape - GameZone</title>
    <style>
        body { margin:0; padding:0; background-color:#0b090a; display:flex; justify-content:center; align-items:center; height:100vh; font-family:'Georgia',serif; overflow:hidden; }
        #gameCanvas { background:linear-gradient(to bottom,#1a0f2e,#4a154b,#ff7b54); border:5px solid #2b1d12; box-shadow:0px 15px 35px rgba(0,0,0,0.9); border-radius:4px; max-width:100%; max-height:100%; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        if (type === 'jump') { osc.type='triangle'; osc.frequency.setValueAtTime(150,audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(400,audioCtx.currentTime+0.15); gainNode.gain.setValueAtTime(0.15,audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0.01,audioCtx.currentTime+0.15); osc.start(); osc.stop(audioCtx.currentTime+0.15);
        } else if (type === 'coin') { osc.type='sine'; osc.frequency.setValueAtTime(587.33,audioCtx.currentTime); osc.frequency.setValueAtTime(880,audioCtx.currentTime+0.08); gainNode.gain.setValueAtTime(0.1,audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0.01,audioCtx.currentTime+0.25); osc.start(); osc.stop(audioCtx.currentTime+0.25);
        } else if (type === 'gameover') { osc.type='sawtooth'; osc.frequency.setValueAtTime(300,audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(60,audioCtx.currentTime+0.4); gainNode.gain.setValueAtTime(0.2,audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0.01,audioCtx.currentTime+0.4); osc.start(); osc.stop(audioCtx.currentTime+0.4); } }
    let player = { x:90, y:280, width:32, height:60, jumping:false, yVelocity:0, animFrame:0, gender:'boy' };
    let gameState='START_SCREEN'; let gravity=0.45; let jumpStrength=-11.5; let baseSpeed=1.6; let gameSpeed=baseSpeed; let score=0; let treasures=0;
    let obstacles=[]; let coins=[]; let backgroundElements=[]; let stars=[]; let torches=[]; let spawnTimer=0;
    for (let i=0;i<40;i++) stars.push({x:Math.random()*canvas.width,y:Math.random()*150,size:Math.random()*2,alpha:Math.random()});
    function handleAction() { if(gameState==='START_SCREEN') return; if(gameState==='PLAYING') { if(!player.jumping){player.yVelocity=jumpStrength;player.jumping=true;playSound('jump');} } else if(gameState==='GAMEOVER') resetGame(); }
    document.addEventListener("touchstart",function(e){e.preventDefault();if(gameState==='START_SCREEN'){let touchX=e.touches[0].clientX-canvas.getBoundingClientRect().left;let touchY=e.touches[0].clientY-canvas.getBoundingClientRect().top;let canvasTouchX=touchX*(canvas.width/canvas.getBoundingClientRect().width);let canvasTouchY=touchY*(canvas.height/canvas.getBoundingClientRect().height);if(canvasTouchX>=180&&canvasTouchX<=340&&canvasTouchY>=240&&canvasTouchY<=300){player.gender='boy';gameState='PLAYING';audioCtx.resume();}if(canvasTouchX>=460&&canvasTouchX<=620&&canvasTouchY>=240&&canvasTouchY<=300){player.gender='girl';gameState='PLAYING';audioCtx.resume();}return;}handleAction();});
    document.addEventListener("keydown",function(event){if(event.code==="Space"||event.code==="ArrowUp"){if(gameState==='START_SCREEN'){gameState='PLAYING';return;}handleAction();}});
    function spawnBackgroundElement(){if(Math.random()>0.5)backgroundElements.push({x:canvas.width,y:100+Math.random()*50,width:50,height:200,type:'ruin_pillar',speedMultiplier:0.2});}
    function spawnTorch(){torches.push({x:canvas.width,y:200,fireFrame:0});}
    function spawnObstacle(){let rand=Math.random();if(rand>0.5){obstacles.push({x:canvas.width,y:298,width:28,height:42,type:'stone'});}else{obstacles.push({x:canvas.width,y:318,width:38,height:22,type:'gold_spikes'});}}
    function spawnCoin(){let coinY=Math.random()>0.5?210:150;coins.push({x:canvas.width,y:coinY,radius:11,pulse:0});}
    function update(){if(gameState!=='PLAYING')return;player.animFrame+=gameSpeed*0.05;player.yVelocity+=gravity;player.y+=player.yVelocity;if(player.y>=280){player.y=280;player.jumping=false;player.yVelocity=0;}for(let star of stars){star.alpha+=(Math.random()-0.5)*0.1;if(star.alpha<0)star.alpha=0;if(star.alpha>1)star.alpha=1;}spawnTimer++;if(spawnTimer%240===0)spawnBackgroundElement();if(spawnTimer%260===0)spawnTorch();if(spawnTimer%200===0)spawnObstacle();if(spawnTimer%120===0)spawnCoin();for(let t of torches){t.x-=gameSpeed;t.fireFrame+=0.2;}if(torches.length>0&&torches[0].x<-20)torches.shift();for(let bg of backgroundElements){bg.x-=gameSpeed*bg.speedMultiplier;}if(backgroundElements.length>0&&backgroundElements[0].x+backgroundElements[0].width<0)backgroundElements.shift();for(let i=obstacles.length-1;i>=0;i--){obstacles[i].x-=gameSpeed;if(player.x+6<obstacles[i].x+obstacles[i].width&&player.x+player.width-6>obstacles[i].x&&player.y<obstacles[i].y+obstacles[i].height&&player.y+player.height>obstacles[i].y){gameState='GAMEOVER';playSound('gameover');}if(obstacles[i].x+obstacles[i].width<0){obstacles.splice(i,1);score+=5;gameSpeed=baseSpeed+(score*0.005);}}for(let j=coins.length-1;j>=0;j--){coins[j].x-=gameSpeed;coins[j].pulse+=0.1;let distX=Math.abs(coins[j].x-(player.x+player.width/2));let distY=Math.abs(coins[j].y-(player.y+player.height/2));if(distX<(player.width/2+coins[j].radius)&&distY<(player.height/2+coins[j].radius)){treasures++;playSound('coin');coins.splice(j,1);continue;}if(coins[j].x+coins[j].radius<0)coins.splice(j,1);}}
    function drawPlayer(x,y,gender,animFrame,jumping){ctx.save();ctx.translate(x+16,y+30);if(!jumping){ctx.fillStyle="rgba(0,0,0,0.3)";ctx.beginPath();ctx.ellipse(0,30,16,5,0,0,Math.PI*2);ctx.fill();}let runCycle=Math.sin(animFrame);if(gender==='boy'){ctx.fillStyle="#d2b48c";ctx.fillRect(-10,-15,20,24);ctx.fillStyle="#3d2314";ctx.fillRect(-10,9,20,4);ctx.fillStyle="#5c4033";ctx.fillRect(-10,13,20,8);ctx.fillStyle="#ffd1b3";ctx.fillRect(-4,-20,8,6);ctx.beginPath();ctx.arc(0,-24,10,0,Math.PI*2);ctx.fill();ctx.fillStyle="#3d2314";ctx.fillRect(-15,-32,30,4);ctx.fillRect(-9,-40,18,9);}else{ctx.fillStyle="#4a154b";ctx.fillRect(-10,-15,20,26);ctx.fillStyle="#ff7b54";ctx.fillRect(-10,0,20,5);ctx.fillStyle="#ffd1b3";ctx.beginPath();ctx.arc(0,-22,9,0,Math.PI*2);ctx.fill();ctx.fillStyle="#ff477e";ctx.beginPath();ctx.arc(0,-25,10,Math.PI,0);ctx.fill();ctx.fillRect(-10,-25,4,12);ctx.fillRect(6,-25,4,12);}ctx.lineWidth=5;ctx.lineCap="round";ctx.strokeStyle="#222";if(jumping){ctx.beginPath();ctx.moveTo(-5,20);ctx.lineTo(-9,24);ctx.lineTo(-4,28);ctx.stroke();ctx.beginPath();ctx.moveTo(5,20);ctx.lineTo(6,26);ctx.lineTo(12,28);ctx.stroke();}else{ctx.beginPath();ctx.moveTo(-4,20);ctx.lineTo(-4+runCycle*13,34);ctx.stroke();ctx.beginPath();ctx.moveTo(4,20);ctx.lineTo(4-runCycle*13,34);ctx.stroke();}ctx.restore();}
    function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);for(let star of stars){ctx.fillStyle=`rgba(255,255,255,${star.alpha})`;ctx.fillRect(star.x,star.y,star.size,star.size);}ctx.fillStyle="#3a1d38";ctx.beginPath();ctx.moveTo(0,340);ctx.lineTo(200,150);ctx.lineTo(450,340);ctx.fill();ctx.fillStyle="#2c1430";ctx.beginPath();ctx.moveTo(300,340);ctx.lineTo(550,120);ctx.lineTo(800,340);ctx.fill();for(let bg of backgroundElements){let pillarGrad=ctx.createLinearGradient(bg.x,bg.y,bg.x+bg.width,bg.y);pillarGrad.addColorStop(0,"#231326");pillarGrad.addColorStop(0.5,"#422345");pillarGrad.addColorStop(1,"#1d0f21");ctx.fillStyle=pillarGrad;ctx.fillRect(bg.x,bg.y,bg.width,bg.height);}for(let t of torches){ctx.fillStyle="#5c4033";ctx.fillRect(t.x,t.y,6,40);let fireRadius=10+Math.sin(t.fireFrame)*3;let fireGrad=ctx.createRadialGradient(t.x+3,t.y-5,2,t.x+3,t.y-5,fireRadius);fireGrad.addColorStop(0,"#fff700");fireGrad.addColorStop(0.4,"#ff7b00");fireGrad.addColorStop(1,"rgba(255,0,0,0)");ctx.fillStyle=fireGrad;ctx.beginPath();ctx.arc(t.x+3,t.y-5,fireRadius,0,Math.PI*2);ctx.fill();}let groundGrad=ctx.createLinearGradient(0,340,0,400);groundGrad.addColorStop(0,"#3a2312");groundGrad.addColorStop(1,"#0f0804");ctx.fillStyle=groundGrad;ctx.fillRect(0,340,canvas.width,60);ctx.strokeStyle="rgba(0,0,0,0.6)";ctx.lineWidth=3;let roadOffset=(gameState==='PLAYING'?score*12:0)%60;for(let i=-60;i<canvas.width+60;i+=60){ctx.beginPath();ctx.moveTo(i-roadOffset,340);ctx.lineTo(i-roadOffset-25,400);ctx.stroke();}if(gameState==='PLAYING'||gameState==='GAMEOVER'){for(let coin of coins){ctx.beginPath();ctx.arc(coin.x,coin.y,coin.radius,0,Math.PI*2);ctx.fillStyle="#ffd700";ctx.fill();}for(let obs of obstacles){if(obs.type==='stone'){ctx.fillStyle="#5a5a5a";ctx.fillRect(obs.x,obs.y,obs.width,obs.height);}else{ctx.fillStyle="#95a5a6";ctx.beginPath();ctx.moveTo(obs.x,obs.y+obs.height);ctx.lineTo(obs.x+obs.width/2,obs.y);ctx.lineTo(obs.x+obs.width,obs.y+obs.height);ctx.fill();}}drawPlayer(player.x,player.y,player.gender,player.animFrame,player.jumping);}if(gameState==='PLAYING'||gameState==='GAMEOVER'){ctx.fillStyle="rgba(20,12,8,0.85)";ctx.fillRect(20,20,200,70);ctx.strokeStyle="#ff7b54";ctx.lineWidth=2;ctx.strokeRect(20,20,200,70);ctx.fillStyle="#fff";ctx.font="bold 15px 'Courier New'";ctx.fillText("SCORE: "+score,35,45);ctx.fillText("GOLD: "+treasures,35,70);}if(gameState==='START_SCREEN'){ctx.fillStyle="rgba(15,10,25,0.85)";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle="#ffd700";ctx.font="bold 36px 'Georgia'";ctx.textAlign="center";ctx.fillText("TEMPLE ESCAPE 2D",canvas.width/2,100);ctx.fillStyle="#fff";ctx.font="18px Arial";ctx.fillText("CHOOSE YOUR CHARACTER TO START:",canvas.width/2,160);ctx.fillStyle="#3a2312";ctx.fillRect(180,240,160,60);ctx.strokeStyle="#ffd700";ctx.strokeRect(180,240,160,60);ctx.fillStyle="#fff";ctx.font="bold 16px Arial";ctx.fillText("🤠 Explorer",260,275);ctx.fillStyle="#4a154b";ctx.fillRect(460,240,160,60);ctx.strokeStyle="#ff477e";ctx.strokeRect(460,240,160,60);ctx.fillStyle="#fff";ctx.fillText("👩‍🎤 Ninja",540,275);ctx.textAlign="left";}if(gameState==='GAMEOVER'){ctx.fillStyle="rgba(10,5,3,0.9)";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle="#ff7b54";ctx.lineWidth=3;ctx.strokeRect(200,90,400,220);ctx.fillStyle="#ff4747";ctx.font="bold 32px 'Courier New'";ctx.textAlign="center";ctx.fillText("THE TEMPLE CLAIMED YOU",canvas.width/2,145);ctx.fillStyle="#ffffff";ctx.font="18px 'Courier New'";ctx.fillText("FINAL SCORE: "+score,canvas.width/2,195);ctx.fillText("GOLD EXTRACTED: "+treasures,canvas.width/2,225);ctx.fillStyle="#ffd700";ctx.font="italic 16px Arial";ctx.fillText("Tap Screen to Resurrect",canvas.width/2,275);ctx.textAlign="left";}}
    function resetGame(){obstacles=[];coins=[];backgroundElements=[];torches=[];score=0;treasures=0;gameSpeed=baseSpeed;player.y=280;gameState='START_SCREEN';}
    function loop(){update();draw();requestAnimationFrame(loop);}
    loop();
</script>
</body>
</html>
