<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghost Catcher - GameZone</title>
    <style>
        body{margin:0;padding:0;background-color:#0d0114;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Courier New',Courier,monospace;overflow:hidden;user-select:none;}
        canvas{background:linear-gradient(to bottom,#130121,#05000a);border:4px solid #9d4edd;box-shadow:0px 0px 30px #7b2cbf;border-radius:12px;max-width:95vw;max-height:85vh;cursor:pointer;}
    </style>
</head>
<body>
    <canvas id="ghostCanvas" width="400" height="550"></canvas>
<script>
    const canvas=document.getElementById("ghostCanvas");const ctx=canvas.getContext("2d");let audioCtx=null;function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}function playSound(type){if(!audioCtx)return;if(audioCtx.state==='suspended')audioCtx.resume();const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();osc.connect(gain);gain.connect(audioCtx.destination);if(type==='catch'){osc.type='sawtooth';osc.frequency.setValueAtTime(300,audioCtx.currentTime);osc.frequency.exponentialRampToValueAtTime(100,audioCtx.currentTime+0.1);gain.gain.setValueAtTime(0.15,audioCtx.currentTime);osc.start();osc.stop(audioCtx.currentTime+0.1);}else if(type==='miss'){osc.type='sine';osc.frequency.setValueAtTime(150,audioCtx.currentTime);gain.gain.setValueAtTime(0.2,audioCtx.currentTime);gain.gain.linearRampToValueAtTime(0.01,audioCtx.currentTime+0.2);osc.start();osc.stop(audioCtx.currentTime+0.2);}else if(type==='gameover'){osc.type='sawtooth';osc.frequency.setValueAtTime(200,audioCtx.currentTime);osc.frequency.linearRampToValueAtTime(30,audioCtx.currentTime+0.6);gain.gain.setValueAtTime(0.3,audioCtx.currentTime);osc.start();osc.stop(audioCtx.currentTime+0.6);}}
    let score=0;let lives=3;let isGameOver=false;let ghost={x:0,y:0,radius:25,visible:false,timer:0,duration:1200,color:"#e0aaff"};let bats=[];for(let i=0;i<5;i++){bats.push({x:Math.random()*canvas.width,y:Math.random()*200,speed:Math.random()*2+1,wing:0});}
    function spawnGhost(){if(isGameOver)return;let padding=40;ghost.x=padding+Math.random()*(canvas.width-padding*2);ghost.y=100+Math.random()*(canvas.height-padding*2);ghost.visible=true;ghost.timer=Date.now();ghost.duration=Math.max(600,1300-(score*5));}
    function handleTap(clientX,clientY){initAudio();if(isGameOver){resetGame();return;}if(!ghost.visible)return;const rect=canvas.getBoundingClientRect();const canvasX=(clientX-rect.left)*(canvas.width/rect.width);const canvasY=(clientY-rect.top)*(canvas.height/rect.height);let dist=Math.hypot(canvasX-ghost.x,canvasY-ghost.y);if(dist<=ghost.radius+15){score+=10;playSound('catch');ghost.visible=false;setTimeout(spawnGhost,Math.random()*400+200);}}
    canvas.addEventListener("touchstart",function(e){e.preventDefault();handleTap(e.touches[0].clientX,e.touches[0].clientY);});canvas.addEventListener("mousedown",function(e){handleTap(e.clientX,e.clientY);});
    function update(){for(let bat of bats){bat.x-=bat.speed;bat.wing+=0.15;if(bat.x<-20){bat.x=canvas.width+20;bat.y=Math.random()*250;}}if(isGameOver)return;if(ghost.visible&&(Date.now()-ghost.timer>ghost.duration)){ghost.visible=false;lives--;playSound('miss');if(lives<=0){isGameOver=true;playSound('gameover');}else{setTimeout(spawnGhost,500);}}}
    function drawGhost(ctx,x,y,r){ctx.save();ctx.fillStyle=ghost.color;ctx.shadowBlur=15;ctx.shadowColor="#c77dff";ctx.beginPath();ctx.arc(x,y-r/4,r,Math.PI,0,false);ctx.lineTo(x+r,y+r);ctx.lineTo(x+r*0.6,y+r*0.6);ctx.lineTo(x+r*0.2,y+r);ctx.lineTo(x-r*0.2,y+r*0.6);ctx.lineTo(x-r*0.6,y+r);ctx.lineTo(x-r,y+r);ctx.closePath();ctx.fill();ctx.fillStyle="#10002b";ctx.beginPath();ctx.arc(x-r/2.5,y-r/3,4,0,Math.PI*2);ctx.arc(x+r/2.5,y-r/3,4,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x,y+2,3,0,Math.PI*2);ctx.fill();ctx.restore();}
    function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle="rgba(157,78,221,0.2)";for(let bat of bats){let wingY=Math.sin(bat.wing)*8;ctx.beginPath();ctx.moveTo(bat.x,bat.y);ctx.lineTo(bat.x-12,bat.y-wingY);ctx.lineTo(bat.x-4,bat.y+2);ctx.lineTo(bat.x,bat.y+6);ctx.lineTo(bat.x+4,bat.y+2);ctx.lineTo(bat.x+12,bat.y-wingY);ctx.closePath();ctx.fill();}if(ghost.visible)drawGhost(ctx,ghost.x,ghost.y,ghost.radius);ctx.fillStyle="#fff";ctx.font="bold 16px 'Courier New'";ctx.fillText("SCORE: "+score,20,35);let heartStr="";for(let l=0;l<lives;l++)heartStr+="❤ ";ctx.fillStyle="#ff4757";ctx.fillText("LIVES: "+heartStr,20,65);if(isGameOver){ctx.fillStyle="rgba(13,1,20,0.95)";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle="#9d4edd";ctx.lineWidth=3;ctx.strokeRect(40,canvas.height/2-120,canvas.width-80,220);ctx.fillStyle="#ff4747";ctx.font="bold 32px 'Courier New'";ctx.textAlign="center";ctx.fillText("HAUNTED GAME OVER",canvas.width/2,canvas.height/2-60);ctx.fillStyle="#ffffff";ctx.font="18px 'Courier New'";ctx.fillText("Ghosts Caught: "+(score/10),canvas.width/2,canvas.height/2-10);ctx.fillText("Final Score: "+score,canvas.width/2,canvas.height/2+20);ctx.fillStyle="#7b2cbf";ctx.font="italic 16px Arial";ctx.fillText("Tap Screen to Exorcise Again",canvas.width/2,canvas.height/2+70);ctx.textAlign="left";}}
    function resetGame(){score=0;lives=3;isGameOver=false;spawnGhost();}
    function loop(){update();draw();requestAnimationFrame(loop);}
    spawnGhost();loop();
</script>
</body>
</html>
